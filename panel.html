<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>Al Azim Portal — Panel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#0e1526; --navy2:#141d33; --navy3:#1a2542; --gold:#d4af37; --gold2:#b8962e;
    --ink:#eef1f8; --mut:#93a0bd; --line:#243354; --ok:#7ee2a8; --bad:#f28b82;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{ font-family:'Manrope',sans-serif; background:var(--navy); color:var(--ink); min-height:100vh; }

  header{ display:flex; align-items:center; gap:12px; padding:14px 18px;
          background:var(--navy2); border-bottom:1px solid var(--line); position:sticky; top:0; z-index:10; }
  .mark{ width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;
         background:linear-gradient(135deg,var(--gold),var(--gold2)); color:#0e1526; font-weight:800; font-size:15px; }
  header h1{ font-size:16px; font-weight:800; flex:1 }
  header .who{ font-size:12px; color:var(--mut); text-align:right; line-height:1.4 }
  header button{ background:none; border:1px solid var(--line); color:var(--mut); border-radius:8px;
                 padding:7px 12px; font-family:inherit; font-size:12.5px; font-weight:700; cursor:pointer; }
  header button:hover{ color:var(--ink); border-color:var(--gold) }

  nav{ display:flex; gap:6px; padding:12px 18px 0; background:var(--navy2); border-bottom:1px solid var(--line); overflow-x:auto }
  nav button{ background:none; border:none; color:var(--mut); font-family:inherit; font-size:14px; font-weight:700;
              padding:10px 14px; cursor:pointer; border-bottom:2px solid transparent; white-space:nowrap; }
  nav button.on{ color:var(--gold); border-bottom-color:var(--gold) }
  nav .badge{ background:var(--bad); color:#1a0d0d; border-radius:20px; font-size:11px; padding:1px 7px; margin-left:5px; font-weight:800 }

  main{ padding:18px; max-width:1100px; margin:0 auto }
  .empty{ color:var(--mut); text-align:center; padding:50px 20px; font-size:14.5px }

  .row{ background:var(--navy2); border:1px solid var(--line); border-radius:12px; padding:14px 16px; margin-bottom:10px; }
  .row .top{ display:flex; align-items:center; gap:10px; flex-wrap:wrap }
  .row .name{ font-weight:800; font-size:15px }
  .row .uni{ color:var(--mut); font-size:13px; flex:1; min-width:120px }
  .pill{ font-size:11.5px; font-weight:800; padding:4px 10px; border-radius:20px; letter-spacing:.3px }
  .row .meta{ color:var(--mut); font-size:12.5px; margin-top:8px; line-height:1.6 }
  .row .actions{ display:flex; gap:8px; margin-top:10px; flex-wrap:wrap; align-items:center }
  select, .frm input, .frm select{
    background:var(--navy); color:var(--ink); border:1px solid var(--line); border-radius:8px;
    padding:9px 11px; font-family:inherit; font-size:13.5px; outline:none; }
  .frm input:focus, .frm select:focus{ border-color:var(--gold) }
  .btn{ border:none; border-radius:8px; padding:9px 14px; font-family:inherit; font-size:13px; font-weight:800; cursor:pointer; }
  .btn.gold{ background:linear-gradient(135deg,var(--gold),var(--gold2)); color:#0e1526 }
  .btn.ok{ background:var(--ok); color:#0c1f14 }
  .btn.bad{ background:none; border:1px solid var(--bad); color:var(--bad) }
  .btn:disabled{ opacity:.5; cursor:wait }
  .hist,.docs{ margin-top:10px; border-top:1px dashed var(--line); padding-top:8px; font-size:12.5px; color:var(--mut); display:none }
  .hist.show,.docs.show{ display:block }
  .hist div,.docs div{ padding:2px 0 }
  .docs a{ color:var(--gold); text-decoration:none; font-weight:700 }
  .linkish{ background:none;border:none;color:var(--mut);font-family:inherit;font-size:12px;cursor:pointer;text-decoration:underline;padding:0 }

  /* Yeni öğrenci formu */
  .frm{ background:var(--navy2); border:1px solid var(--line); border-radius:12px; padding:20px; }
  .frm h3{ font-size:13px; color:var(--gold); letter-spacing:.1em; margin:18px 0 10px; text-transform:uppercase }
  .frm h3:first-child{ margin-top:0 }
  .fgrid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(210px,1fr)); gap:10px }
  .fgrid label{ display:block; font-size:11.5px; font-weight:700; color:var(--mut); margin-bottom:4px;
                text-transform:uppercase; letter-spacing:.5px }
  .fgrid input,.fgrid select{ width:100% }
  .fgrid input[type=file]{ padding:7px; font-size:12px }
  .frm .btn{ margin-top:18px; padding:12px 22px; font-size:14px }
  .fmsg{ margin-top:12px; font-size:13.5px; min-height:18px }
  .fmsg.err{ color:var(--bad) } .fmsg.ok{ color:var(--ok) }

  .toast{ position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
          background:var(--navy3); border:1px solid var(--gold); color:var(--ink);
          padding:11px 18px; border-radius:10px; font-size:13.5px; font-weight:700;
          opacity:0; pointer-events:none; transition:opacity .25s; z-index:50; max-width:90vw; }
  .toast.show{ opacity:1 }
</style>
</head>
<body>
  <header>
    <div class="mark">AZ</div>
    <h1>Al Azim Portal</h1>
    <div class="who" id="who"></div>
    <button id="logout">Çıkış</button>
  </header>

  <nav>
    <button class="on" data-tab="apps" id="tabApps">Başvurular</button>
    <button data-tab="add" id="tabAdd">+ Yeni Öğrenci</button>
    <button data-tab="agencies" id="tabAgencies">Acentalar</button>
    <button data-tab="pending" id="tabPending">Onay bekleyen<span class="badge" id="pendBadge" style="display:none">0</span></button>
  </nav>

  <main id="main"><div class="empty">Yükleniyor…</div></main>
  <div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script>
const M = document.getElementById("main");
let me = null, tab = "apps", agencyList = [];

function toast(t){ const el=document.getElementById("toast"); el.textContent=t; el.classList.add("show");
                   setTimeout(()=>el.classList.remove("show"), 3200); }
const esc = s => String(s ?? "").replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const dt = s => new Date(s).toLocaleString("tr-TR",{day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"});
const DOC_TYPES = { passport:"Pasaport", diploma:"Diploma", transcript:"Transkript", photo:"Biyometrik Foto" };

// ---------- Giriş kontrolü ----------
(async () => {
  const { data:{ session } } = await sb.auth.getSession();
  if (!session){ location.href = "index.html"; return; }
  const { data: prof } = await sb.from("profiles").select("*").eq("id", session.user.id).single();
  me = prof;
  if (!me || me.role === "pending"){
    M.innerHTML = '<div class="empty">Hesabınız onay bekliyor. Yönetici onayladığında panele erişebileceksiniz.</div>';
    document.querySelector("nav").style.display = "none";
    document.getElementById("who").textContent = session.user.email;
    return;
  }
  if (me.role === "rejected"){
    M.innerHTML = '<div class="empty">Hesabınıza erişim kapatılmıştır.</div>';
    document.querySelector("nav").style.display = "none"; return;
  }
  document.getElementById("who").innerHTML =
    esc(me.full_name || me.email) + "<br>" + (me.role === "admin" ? "Yönetici" : "Acenta");
  if (me.role !== "admin"){
    document.getElementById("tabApps").textContent = "Öğrencilerim";
    document.getElementById("tabAgencies").style.display = "none";
    document.getElementById("tabPending").style.display = "none";
  } else {
    refreshPendingBadge();
    const { data } = await sb.from("agencies").select("id,name").eq("status","approved").order("name");
    agencyList = data || [];
  }
  loadTab();
})();

document.getElementById("logout").onclick = async () => { await sb.auth.signOut(); location.href="index.html"; };
document.querySelectorAll("nav button").forEach(b => b.onclick = () => {
  document.querySelectorAll("nav button").forEach(x=>x.classList.remove("on"));
  b.classList.add("on"); tab = b.dataset.tab; loadTab();
});

function loadTab(){
  M.innerHTML = '<div class="empty">Yükleniyor…</div>';
  if (tab==="apps") loadApps();
  else if (tab==="add") renderAddForm();
  else if (tab==="agencies") loadAgencies();
  else loadPending();
}

// ---------- BAŞVURULAR / ÖĞRENCİLERİM ----------
async function loadApps(){
  const { data, error } = await sb.from("applications")
    .select("*, students(id,first_name,last_name,email,phone,citizenship,lang,agency_id,agencies(name))")
    .order("created_at",{ascending:false}).limit(200);
  if (error){ M.innerHTML = `<div class="empty">Hata: ${esc(error.message)}</div>`; return; }
  if (!data.length){
    M.innerHTML = me.role==="admin"
      ? '<div class="empty">Henüz başvuru yok.</div>'
      : '<div class="empty">Henüz öğrenciniz yok. "+ Yeni Öğrenci" sekmesinden ilk öğrencinizi ekleyin.</div>';
    return;
  }

  M.innerHTML = data.map(a => {
    const s = a.students || {};
    const st = STATUS_LABELS[a.status] || {t:a.status,c:"#888"};
    const opts = Object.entries(STATUS_LABELS)
      .map(([k,v]) => `<option value="${k}" ${k===a.status?"selected":""}>${v.t}</option>`).join("");
    return `<div class="row" data-id="${a.id}" data-sid="${s.id||""}">
      <div class="top">
        <span class="name">${esc(s.first_name)} ${esc(s.last_name)}</span>
        <span class="uni">${esc(a.university)}${a.program1 ? " · " + esc(a.program1):""}</span>
        <span class="pill" style="background:${st.c}22;color:${st.c};border:1px solid ${st.c}55">${st.t}</span>
      </div>
      <div class="meta">
        ${esc(s.email)} · ${esc(s.phone)} · ${esc(s.citizenship)}
        ${s.agencies ? " · Acenta: <b>"+esc(s.agencies.name)+"</b>" : " · Direkt başvuru"}
        · ${dt(a.created_at)}
      </div>
      <div class="actions">
        ${me.role==="admin" ? `<select class="stSel">${opts}</select>
        <button class="btn gold stSave">Durumu kaydet + öğrenciye mail</button>` : ""}
        <button class="linkish histBtn">Geçmiş</button>
        <button class="linkish docBtn">Belgeler</button>
      </div>
      <div class="hist"></div><div class="docs"></div>
    </div>`;
  }).join("");

  M.querySelectorAll(".stSave").forEach(btn => btn.onclick = () => saveStatus(btn));
  M.querySelectorAll(".histBtn").forEach(btn => btn.onclick = () => showHist(btn));
  M.querySelectorAll(".docBtn").forEach(btn => btn.onclick = () => showDocs(btn));
}

async function saveStatus(btn){
  const row = btn.closest(".row"), id = row.dataset.id;
  const newStatus = row.querySelector(".stSel").value;
  btn.disabled = true;
  const { error } = await sb.from("applications").update({ status:newStatus }).eq("id", id);
  if (error){ toast("Hata: " + error.message); btn.disabled=false; return; }
  try{
    const { data:{ session } } = await sb.auth.getSession();
    const r = await fetch("/api/durum-mail", {
      method:"POST",
      headers:{ "Content-Type":"application/json", "Authorization":"Bearer " + session.access_token },
      body: JSON.stringify({ application_id:id })
    });
    toast(r.ok ? "Durum güncellendi, öğrenciye mail gönderildi ✓"
               : "Durum güncellendi — mail gönderilemedi (api logunu kontrol et)");
  }catch(e){ toast("Durum güncellendi — mail fonksiyonuna ulaşılamadı"); }
  loadApps();
}

async function showHist(btn){
  const row = btn.closest(".row"), box = row.querySelector(".hist");
  if (box.classList.contains("show")){ box.classList.remove("show"); return; }
  const { data } = await sb.from("application_events")
    .select("*").eq("application_id", row.dataset.id).order("created_at",{ascending:false});
  box.innerHTML = (data && data.length)
    ? data.map(e => `<div>${dt(e.created_at)} — ${(STATUS_LABELS[e.old_status]||{t:e.old_status||"—"}).t}
                     → <b>${(STATUS_LABELS[e.new_status]||{t:e.new_status}).t}</b></div>`).join("")
    : "<div>Henüz durum değişikliği yok.</div>";
  box.classList.add("show");
}

async function showDocs(btn){
  const row = btn.closest(".row"), box = row.querySelector(".docs"), sid = row.dataset.sid;
  if (box.classList.contains("show")){ box.classList.remove("show"); return; }
  box.innerHTML = "<div>Yükleniyor…</div>"; box.classList.add("show");
  const { data, error } = await sb.from("documents").select("*").eq("student_id", sid);
  if (error){ box.innerHTML = "<div>Hata: "+esc(error.message)+"</div>"; return; }
  if (!data.length){ box.innerHTML = "<div>Bu öğrenci için yüklenmiş belge yok.</div>"; return; }
  const items = [];
  for (const d of data){
    const { data:u } = await sb.storage.from("documents").createSignedUrl(d.storage_path, 3600);
    items.push(`<div>📄 ${DOC_TYPES[d.doc_type]||esc(d.doc_type)||"Belge"} —
      ${u?.signedUrl ? `<a href="${u.signedUrl}" target="_blank" rel="noopener">görüntüle / indir</a>` : "bağlantı alınamadı"}
      <span style="opacity:.6">(${dt(d.created_at)})</span></div>`);
  }
  box.innerHTML = items.join("");
}

// ---------- YENİ ÖĞRENCİ ----------
function renderAddForm(){
  const agencySel = me.role==="admin"
    ? `<div><label>Acenta</label><select id="f_agency">
         <option value="">Direkt (Al Azim)</option>
         ${agencyList.map(a=>`<option value="${a.id}">${esc(a.name)}</option>`).join("")}
       </select></div>`
    : "";
  M.innerHTML = `<div class="frm">
    <h3>Öğrenci Bilgileri</h3>
    <div class="fgrid">
      <div><label>Ad *</label><input id="f_first"></div>
      <div><label>Soyad *</label><input id="f_last"></div>
      <div><label>Baba Adı</label><input id="f_father"></div>
      <div><label>Anne Adı</label><input id="f_mother"></div>
      <div><label>Doğum Tarihi</label><input id="f_dob" type="date"></div>
      <div><label>Cinsiyet</label><select id="f_gender">
        <option value="">—</option><option>Erkek</option><option>Kadın</option></select></div>
      <div><label>E-posta *</label><input id="f_email" type="email"></div>
      <div><label>Telefon (WhatsApp) *</label><input id="f_phone"></div>
      <div><label>Pasaport No *</label><input id="f_passport"></div>
      <div><label>Vatandaşlık</label><input id="f_nat" value="Türkmenistan"></div>
      <div><label>İkamet Ülkesi</label><input id="f_res" value="Türkmenistan"></div>
      <div><label>Mail Dili</label><select id="f_lang">
        <option value="tk">Türkmençe</option><option value="tr">Türkçe</option>
        <option value="ru">Русский</option><option value="en">English</option></select></div>
      ${agencySel}
    </div>
    <h3>Başvuru</h3>
    <div class="fgrid">
      <div><label>Üniversite *</label><input id="f_uni" placeholder="İstanbul Medipol Üniversitesi"></div>
      <div><label>1. Tercih Bölüm *</label><input id="f_p1"></div>
      <div><label>2. Tercih</label><input id="f_p2"></div>
      <div><label>3. Tercih</label><input id="f_p3"></div>
      <div><label>Seviye</label><select id="f_level">
        <option>Lisans</option><option>Önlisans</option><option>Yüksek Lisans</option>
        <option>Doktora</option><option>Dil Kursu</option></select></div>
      <div><label>Eğitim Dili</label><select id="f_elang">
        <option>İngilizce</option><option>Türkçe</option></select></div>
      <div><label>Dönem</label><input id="f_sem" value="Fall 2026-2027"></div>
    </div>
    <h3>Belgeler (isteğe bağlı, max 10MB)</h3>
    <div class="fgrid">
      <div><label>Pasaport</label><input type="file" id="d_passport" accept=".pdf,.jpg,.jpeg,.png"></div>
      <div><label>Diploma</label><input type="file" id="d_diploma" accept=".pdf,.jpg,.jpeg,.png"></div>
      <div><label>Transkript</label><input type="file" id="d_transcript" accept=".pdf,.jpg,.jpeg,.png"></div>
      <div><label>Biyometrik Foto</label><input type="file" id="d_photo" accept=".jpg,.jpeg,.png"></div>
    </div>
    <button class="btn gold" id="f_save">Öğrenciyi kaydet</button>
    <div class="fmsg" id="f_msg"></div>
  </div>`;
  document.getElementById("f_save").onclick = saveStudent;
}

async function saveStudent(){
  const v = id => (document.getElementById(id)?.value || "").trim();
  const msg = document.getElementById("f_msg"), btn = document.getElementById("f_save");
  if (!v("f_first")||!v("f_last")||!v("f_email")||!v("f_phone")||!v("f_passport")||!v("f_uni")||!v("f_p1")){
    msg.className="fmsg err"; msg.textContent="Yıldızlı alanlar zorunlu."; return;
  }
  btn.disabled = true; msg.className="fmsg"; msg.textContent="Kaydediliyor…";

  const agency_id = me.role==="admin" ? (v("f_agency") || null) : me.agency_id;

  // 1) öğrenci
  const { data: stu, error: e1 } = await sb.from("students").insert({
    agency_id,
    first_name:v("f_first"), last_name:v("f_last"),
    father_name:v("f_father"), mother_name:v("f_mother"),
    birth_date:v("f_dob")||null, gender:v("f_gender"),
    email:v("f_email"), phone:v("f_phone"),
    passport_no:v("f_passport"), citizenship:v("f_nat"),
    residence:v("f_res"), lang:v("f_lang")||"tk"
  }).select().single();
  if (e1){ btn.disabled=false; msg.className="fmsg err"; msg.textContent="Hata: "+e1.message; return; }

  // 2) başvuru
  const { error: e2 } = await sb.from("applications").insert({
    student_id: stu.id, university:v("f_uni"),
    program1:v("f_p1"), program2:v("f_p2"), program3:v("f_p3"),
    level:v("f_level"), edu_lang:v("f_elang"), semester:v("f_sem")
  });
  if (e2){ btn.disabled=false; msg.className="fmsg err"; msg.textContent="Başvuru hatası: "+e2.message; return; }

  // 3) belgeler
  let up = 0, fail = 0;
  for (const t of Object.keys(DOC_TYPES)){
    const inp = document.getElementById("d_"+t);
    const f = inp?.files?.[0];
    if (!f) continue;
    if (f.size > 10*1024*1024){ fail++; continue; }
    msg.textContent = `Belge yükleniyor: ${DOC_TYPES[t]}…`;
    const safe = f.name.replace(/[^\w.\-]+/g,"_");
    const path = `${stu.id}/${t}_${Date.now()}_${safe}`;
    const { error: eu } = await sb.storage.from("documents").upload(path, f);
    if (eu){ fail++; continue; }
    const { error: ed } = await sb.from("documents").insert({
      student_id: stu.id, doc_type: t, storage_path: path });
    if (ed) fail++; else up++;
  }

  msg.className="fmsg ok";
  msg.textContent = `Öğrenci kaydedildi ✓ ${up?up+" belge yüklendi.":""} ${fail?fail+" belge yüklenemedi!":""}`;
  toast("Öğrenci eklendi ✓");
  setTimeout(()=>{ document.getElementById("tabApps").click(); }, 1200);
}

// ---------- ACENTALAR ----------
async function loadAgencies(){
  const { data, error } = await sb.from("agencies").select("*").order("created_at",{ascending:false});
  if (error){ M.innerHTML = `<div class="empty">Hata: ${esc(error.message)}</div>`; return; }
  if (!data.length){ M.innerHTML = '<div class="empty">Kayıtlı acenta yok.</div>'; return; }
  const stMap = { pending:["Onay bekliyor","#f8c86a"], approved:["Aktif","#7ee2a8"],
                  rejected:["Reddedildi","#f28b82"], suspended:["Donduruldu","#93a0bd"] };
  M.innerHTML = data.map(a => {
    const [t,c] = stMap[a.status] || [a.status,"#888"];
    return `<div class="row" data-id="${a.id}">
      <div class="top">
        <span class="name">${esc(a.name)}</span>
        <span class="uni">${esc(a.city)} ${esc(a.country)}</span>
        <span class="pill" style="background:${c}22;color:${c};border:1px solid ${c}55">${t}</span>
      </div>
      <div class="meta">${esc(a.contact_name)} · ${esc(a.email)} · ${esc(a.phone)} · Komisyon: %${a.commission_rate ?? 0}</div>
      <div class="actions">
        ${a.status!=="approved" ? '<button class="btn ok agOk">Onayla</button>':""}
        ${a.status==="approved" ? '<button class="btn bad agSus">Dondur</button>':""}
        ${a.status==="pending" ? '<button class="btn bad agNo">Reddet</button>':""}
      </div>
    </div>`;
  }).join("");
  M.querySelectorAll(".agOk").forEach(b => b.onclick = () => setAgency(b,"approved"));
  M.querySelectorAll(".agNo").forEach(b => b.onclick = () => setAgency(b,"rejected"));
  M.querySelectorAll(".agSus").forEach(b => b.onclick = () => setAgency(b,"suspended"));
}

async function setAgency(btn, status){
  const id = btn.closest(".row").dataset.id;
  btn.disabled = true;
  const { error } = await sb.from("agencies").update({ status }).eq("id", id);
  if (error){ toast("Hata: "+error.message); btn.disabled=false; return; }
  const role = status==="approved" ? "agency" : (status==="rejected" ? "rejected" : "pending");
  await sb.from("profiles").update({ role }).eq("agency_id", id);
  toast("Acenta güncellendi ✓"); loadAgencies(); refreshPendingBadge();
}

// ---------- ONAY BEKLEYEN ----------
async function loadPending(){
  const { data, error } = await sb.from("profiles").select("*")
    .eq("role","pending").order("created_at",{ascending:false});
  if (error){ M.innerHTML = `<div class="empty">Hata: ${esc(error.message)}</div>`; return; }
  if (!data.length){ M.innerHTML = '<div class="empty">Onay bekleyen kullanıcı yok.</div>'; return; }
  M.innerHTML = data.map(p => `<div class="row" data-id="${p.id}">
      <div class="top"><span class="name">${esc(p.full_name)||"(isim yok)"}</span>
        <span class="uni">${esc(p.email)} · ${esc(p.phone)}</span></div>
      <div class="meta">${p.company?("Firma: <b>"+esc(p.company)+"</b> · "):""}${esc(p.city)} ${esc(p.country)} · Kayıt: ${dt(p.created_at)}</div>
      <div class="actions">
        <button class="btn ok pOk">Onayla (acenta yap)</button>
        <button class="btn bad pNo">Reddet</button>
      </div></div>`).join("");
  M.querySelectorAll(".pOk").forEach(b => b.onclick = () => approveUser(b));
  M.querySelectorAll(".pNo").forEach(b => b.onclick = async () => {
    const id = b.closest(".row").dataset.id;
    await sb.from("profiles").update({ role:"rejected" }).eq("id", id);
    toast("Reddedildi"); loadPending(); refreshPendingBadge();
  });
}

async function approveUser(btn){
  const row = btn.closest(".row"), id = row.dataset.id;
  const name = row.querySelector(".name").textContent;
  btn.disabled = true;
  const { data: prof } = await sb.from("profiles").select("*").eq("id", id).single();
  let agencyId = prof.agency_id;
  if (!agencyId){
    const { data: ag, error } = await sb.from("agencies")
      .insert({ name: prof.company || prof.full_name || prof.email, contact_name: prof.full_name,
                email: prof.email, phone: prof.phone, country: prof.country || "",
                city: prof.city || "", status:"approved", owner_id: id })
      .select().single();
    if (error){ toast("Hata: "+error.message); btn.disabled=false; return; }
    agencyId = ag.id;
  } else {
    await sb.from("agencies").update({ status:"approved" }).eq("id", agencyId);
  }
  await sb.from("profiles").update({ role:"agency", agency_id: agencyId }).eq("id", id);
  toast(name + " onaylandı ✓"); loadPending(); refreshPendingBadge();
}

async function refreshPendingBadge(){
  const { count } = await sb.from("profiles").select("*",{count:"exact",head:true}).eq("role","pending");
  const b = document.getElementById("pendBadge");
  if (count > 0){ b.textContent = count; b.style.display = "inline-block"; }
  else b.style.display = "none";
}
</script>
</body>
</html>
