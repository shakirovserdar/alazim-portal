<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>Al Azim Portal — Giriş</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#0e1526; --navy2:#141d33; --gold:#d4af37; --gold2:#b8962e;
    --ink:#eef1f8; --mut:#93a0bd; --line:#243354; --bad:#f28b82;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:'Manrope',sans-serif; background:var(--navy); color:var(--ink);
    min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px;
    background-image:radial-gradient(ellipse 80% 60% at 50% -10%, #1b2847 0%, transparent 60%);
  }
  .card{
    width:100%; max-width:400px; background:var(--navy2); border:1px solid var(--line);
    border-radius:16px; padding:36px 30px;
  }
  .logo{ text-align:center; margin-bottom:26px; }
  .logo .mark{
    display:inline-flex; align-items:center; justify-content:center;
    width:56px; height:56px; border-radius:14px; margin-bottom:12px;
    background:linear-gradient(135deg,var(--gold),var(--gold2)); color:#0e1526;
    font-weight:800; font-size:22px; letter-spacing:.5px;
  }
  .logo h1{ font-size:19px; font-weight:800; letter-spacing:.3px; }
  .logo p{ color:var(--mut); font-size:13px; margin-top:4px; }
  label{ display:block; font-size:12.5px; font-weight:700; color:var(--mut);
         margin:16px 0 6px; text-transform:uppercase; letter-spacing:.6px; }
  input{
    width:100%; padding:12px 14px; border-radius:10px; font-size:15px;
    background:var(--navy); border:1px solid var(--line); color:var(--ink);
    font-family:inherit; outline:none; transition:border-color .15s;
  }
  input:focus{ border-color:var(--gold); }
  button{
    width:100%; margin-top:22px; padding:13px; border:none; border-radius:10px;
    background:linear-gradient(135deg,var(--gold),var(--gold2)); color:#0e1526;
    font-family:inherit; font-size:15px; font-weight:800; cursor:pointer; transition:opacity .15s;
  }
  button:hover{ opacity:.9 }
  button:disabled{ opacity:.5; cursor:wait }
  .msg{ margin-top:14px; font-size:13.5px; text-align:center; min-height:18px; }
  .msg.err{ color:var(--bad) }
  .msg.ok{ color:#7ee2a8 }
  .foot{ margin-top:22px; text-align:center; color:var(--mut); font-size:12px; }
</style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="mark">AZ</div>
      <h1>Al Azim Portal</h1>
      <p>Yönetim ve acenta girişi</p>
    </div>

    <label for="email">E-posta</label>
    <input type="email" id="email" autocomplete="email" placeholder="ornek@alazimdanismanlik.com">

    <label for="pass">Şifre</label>
    <input type="password" id="pass" autocomplete="current-password" placeholder="••••••••">

    <button id="btn">Giriş yap</button>
    <div class="msg" id="msg"></div>

    <div class="foot">© Al Azim Danışmanlık · alazimdanismanlik.com</div>
  </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script>
  const $ = id => document.getElementById(id);

  // Zaten girişliyse direkt panele
  sb.auth.getSession().then(({data}) => { if (data.session) location.href = "panel.html"; });

  async function login(){
    const email = $("email").value.trim(), pass = $("pass").value;
    const msg = $("msg");
    if(!email || !pass){ msg.className="msg err"; msg.textContent="E-posta ve şifre gerekli."; return; }
    $("btn").disabled = true; msg.className="msg"; msg.textContent="Giriş yapılıyor…";

    const { error } = await sb.auth.signInWithPassword({ email, password: pass });
    if (error){
      $("btn").disabled = false;
      msg.className="msg err";
      msg.textContent = /Invalid login/i.test(error.message)
        ? "E-posta veya şifre hatalı." : "Giriş başarısız: " + error.message;
      return;
    }
    msg.className="msg ok"; msg.textContent="Giriş başarılı, yönlendiriliyor…";
    location.href = "panel.html";
  }
  $("btn").addEventListener("click", login);
  $("pass").addEventListener("keydown", e => { if(e.key==="Enter") login(); });
</script>
</body>
</html>
